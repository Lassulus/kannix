<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kannix - {% block title %}Kanban{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
        h1 { margin-bottom: 1rem; color: #e94560; }
        .board { display: flex; gap: 1rem; overflow-x: auto; min-height: 80vh; }
        .column { background: #16213e; border-radius: 8px; min-width: 280px; flex: 1; padding: 0.75rem; display: flex; flex-direction: column; }
        .column-header { font-weight: 600; padding: 0.5rem; margin-bottom: 0.5rem; border-bottom: 2px solid #e94560; display: flex; justify-content: space-between; align-items: center; }
        .column-header .count { background: #e94560; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .ticket-list { flex: 1; min-height: 50px; }
        .ticket-card { background: #0f3460; border-radius: 6px; padding: 0.75rem; margin-bottom: 0.5rem; cursor: grab; border-left: 3px solid #e94560; transition: transform 0.1s; }
        .ticket-card:hover { transform: translateX(2px); }
        .ticket-card .title { font-weight: 500; margin-bottom: 0.25rem; }
        .ticket-card .meta { font-size: 0.8rem; color: #888; }
        .sortable-ghost { opacity: 0.4; }
        .btn { background: #e94560; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .btn:hover { background: #c23152; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
        form.login-form { max-width: 400px; margin: 4rem auto; background: #16213e; padding: 2rem; border-radius: 8px; }
        form.login-form input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; background: #0f3460; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; }
        form.login-form label { display: block; margin-top: 0.75rem; }
        .error { color: #e94560; margin-bottom: 1rem; }
        .create-form { margin-bottom: 0.5rem; }
        .create-form input { width: 100%; padding: 0.4rem; background: #0f3460; border: 1px solid #333; color: #e0e0e0; border-radius: 4px; margin-bottom: 0.25rem; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
