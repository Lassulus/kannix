{% extends "base.html" %}
{% block title %}{{ ticket.title }}{% endblock %}
{% block content %}
<div class="container">
    <div class="toolbar">
        <h1>
            <a href="/board" style="text-decoration: none; color: var(--accent);">← Board</a>
            &nbsp;/ <span id="ticket-title">{{ ticket.title }}</span>
        </h1>
        <span class="meta">{{ ticket.column }} · {{ ticket.id[:8] }}</span>
    </div>
    <div>
        <form class="ticket-edit-form" id="ticket-form"
              hx-put="/htmx/tickets/{{ ticket.id }}"
              hx-target="#ticket-info" hx-swap="innerHTML">
            <label for="title">Title</label>
            <input class="edit-input" type="text" name="title" id="field-title" value="{{ ticket.title }}">
            <label for="description">Description</label>
            <textarea name="description" id="field-description" rows="3">{{ ticket.description }}</textarea>
            <div><button type="submit" class="btn btn-sm">Save</button></div>
        </form>
        <div id="ticket-info"></div>
    </div>
    {% if git_enabled %}
    <h2 style="margin-bottom: 0.5rem;">Repositories</h2>
    <div id="repos-section">
        {% include "partials/ticket_repos.html" %}
    </div>
    {% endif %}

    <h2 style="margin-bottom: 0.5rem; margin-top: 1rem;">Terminal</h2>
    <div id="terminal-container"></div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
(function() {
    const style = getComputedStyle(document.documentElement);
    const bg = style.getPropertyValue('--bg-card').trim() || '#0f3460';
    const fg = style.getPropertyValue('--text-primary').trim() || '#e0e0e0';
    const cursor = style.getPropertyValue('--accent').trim() || '#e94560';

    // Size terminal to fill remaining viewport
    var container = document.getElementById('terminal-container');
    var rect = container.getBoundingClientRect();
    container.style.height = Math.max(200, window.innerHeight - rect.top - 16) + 'px';

    const term = new Terminal({
        cursorBlink: true,
        theme: { background: bg, foreground: fg, cursor: cursor },
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(container);
    fitAddon.fit();

    const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${wsProtocol}//${location.host}/ws/terminal/{{ ticket.id }}?token={{ token }}`;
    const ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
        ws.send(JSON.stringify({type: 'resize', cols: term.cols, rows: term.rows}));
    };

    ws.onmessage = function(evt) {
        if (evt.data instanceof ArrayBuffer) {
            term.write(new Uint8Array(evt.data));
        } else {
            term.write(evt.data);
        }
    };

    term.onData(function(data) {
        if (ws.readyState === WebSocket.OPEN) {
            ws.send(new Blob([new TextEncoder().encode(data)]));
        }
    });

    term.onResize(function(size) {
        if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'resize', cols: size.cols, rows: size.rows}));
        }
    });

    window.addEventListener('resize', function() { fitAddon.fit(); });

    // Refit xterm when container is resized via CSS resize handle
    new ResizeObserver(function() { fitAddon.fit(); }).observe(container);

    ws.onclose = function() {
        term.write('\r\n\x1b[31m[Connection closed. Reconnecting in 3s...]\x1b[0m\r\n');
        setTimeout(function() { location.reload(); }, 3000);
    };
})();

// Poll for ticket field changes (skip if user is editing)
(function() {
    var formFocused = false;
    var form = document.getElementById('ticket-form');
    form.addEventListener('focusin', function() { formFocused = true; });
    form.addEventListener('focusout', function() { formFocused = false; });

    setInterval(function() {
        if (formFocused) return;
        fetch('/htmx/tickets/{{ ticket.id }}/fields', {credentials: 'same-origin'})
            .then(function(r) { return r.ok ? r.text() : null; })
            .then(function(html) {
                if (!html || formFocused) return;
                var tmp = document.createElement('div');
                tmp.innerHTML = html;
                var newTitle = tmp.querySelector('input[name="title"]');
                var newDesc = tmp.querySelector('textarea[name="description"]');
                if (newTitle) document.getElementById('field-title').value = newTitle.value;
                if (newDesc) document.getElementById('field-description').value = newDesc.textContent;
                // Update header title too
                var span = document.getElementById('ticket-title');
                if (span && newTitle) span.textContent = newTitle.value;
            });
    }, 3000);
})();
</script>
{% endblock %}
